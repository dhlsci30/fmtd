name: Generate bookmarklets

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:  # Allow manual triggering

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to push changes

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch full history for git operations

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies (optional)
        run: npm install --global js-beautify  # For formatting

      - name: Convert fmtd-i.js to Bookmarklet
        id: convert-i
        run: |
          # Read the JS file
          JS_FILE="fmtd-i.js"
          if [ ! -f "$JS_FILE" ]; then
            echo "Error: $JS_FILE not found!"
            exit 1
          fi

          # Convert to bookmarklet
          BOOKMARKLET_I=$(cat "$JS_FILE" | \
            sed 's/^ *//;s/ *$//' | \
            tr -d '\n' | \
            sed 's/"/\\"/g' | \
            sed 's/`/\\`/g' | \
            sed "s/'/\\'/g" | \
            awk '{print "javascript:(function(){" $0 "})()"}')

          # Save to file
          echo "$BOOKMARKLET_I" > fmtd-i-bookmarklet.min.js

          # Output for debugging
          echo "Bookmarklet for fmtd-i.js generated:"
          echo "$BOOKMARKLET_I"

      - name: Convert fmtd-o.js to Bookmarklet
        id: convert-o
        run: |
          # Read the JS file
          JS_FILE="fmtd-o.js"
          if [ ! -f "$JS_FILE" ]; then
            echo "Error: $JS_FILE not found!"
            exit 1
          fi

          # Convert to bookmarklet
          BOOKMARKLET_O=$(cat "$JS_FILE" | \
            sed 's/^ *//;s/ *$//' | \
            tr -d '\n' | \
            sed 's/"/\\"/g' | \
            sed 's/`/\\`/g' | \
            sed "s/'/\\'/g" | \
            awk '{print "javascript:(function(){" $0 "})()"}')

          # Save to file
          echo "$BOOKMARKLET_O" > fmtd-o-bookmarklet.min.js

          # Output for debugging
          echo "Bookmarklet for fmtd-o.js generated:"
          echo "$BOOKMARKLET_O"

      - name: Commit bookmarklet files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add fmtd-i-bookmarklet.min.js fmtd-o-bookmarklet.min.js
          git diff --quiet && git diff --staged --quiet || git commit -m "Update bookmarklet files [skip ci]"
          git push
